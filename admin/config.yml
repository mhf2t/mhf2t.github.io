backend:
  name: git-gateway
  branch: main

media_folder: "uploads"
public_folder: "/uploads"

site_url: "/"
display_url: "/"

publish_mode: editorial_workflow

collections:

  # =========================
  # PROJECTS
  # =========================

  - name: "projects"
    label: "Projects"
    label_singular: "Project"

    files:

      - file: "_data/projects.json"
        label: "Portfolio Projects"
        name: "projects"

        fields:

          - label: "Projects"
            name: "items"
            widget: "list"

            summary: "{{fields.title}} — {{fields.category}}"

            fields:

              # BASIC

              - label: "Title"
                name: "title"
                widget: "string"

              - label: "Category"
                name: "category"
                widget: "select"

                options:
                  - { label: "Research", value: "research" }
                  - { label: "BIM", value: "bim" }
                  - { label: "Simulation", value: "simulation" }
                  - { label: "AI & ML", value: "ai" }
                  - { label: "Computational Design", value: "computational" }
                  - { label: "Architecture", value: "architecture" }
                  - { label: "Visualization", value: "visualization" }
                  - { label: "Art", value: "art" }

              - label: "Year"
                name: "year"
                widget: "string"
                default: "2026"

              - label: "Featured Project"
                name: "featured"
                widget: "boolean"
                default: false

              - label: "Project Status"
                name: "status"
                widget: "select"

                options:
                  - { label: "Completed", value: "completed" }
                  - { label: "Ongoing", value: "ongoing" }
                  - { label: "Research", value: "research" }
                  - { label: "Published", value: "published" }

              # CONTENT

              - label: "Short Description"
                name: "description"
                widget: "text"

              - label: "Detailed Description"
                name: "long_description"
                widget: "markdown"
                required: false

              # VISUALS

              - label: "Cover Image"
                name: "image"
                widget: "image"
                required: false

              - label: "Gallery Images"
                name: "gallery"
                widget: "list"
                required: false
                field:
                  label: "Image"
                  name: "image"
                  widget: "image"

              # RESEARCH / ARCHITECTURE METADATA

              - label: "Tools Used"
                name: "tools"
                widget: "list"
                required: false

              - label: "Research Areas"
                name: "research_areas"
                widget: "list"
                required: false

              - label: "Collaborators"
                name: "collaborators"
                widget: "list"
                required: false

              - label: "Institution"
                name: "institution"
                widget: "string"
                required: false

              # TAGS

              - label: "Tags"
                name: "tags"
                widget: "list"
                required: false

              # LINKS

              - label: "Live Website"
                name: "link"
                widget: "string"
                required: false

              - label: "GitHub URL"
                name: "github"
                widget: "string"
                required: false

              - label: "Paper URL"
                name: "paper"
                widget: "string"
                required: false

              - label: "Video URL"
                name: "video"
                widget: "string"
                required: false

              - label: "Upload PDF"
                name: "file"
                widget: "file"
                required: false

              # ORDERING

              - label: "Display Order"
                name: "order"
                widget: "number"
                default: 1

  # =========================
  # ABOUT
  # =========================

  - name: "about"
    label: "About"

    files:

      - file: "_data/about.json"
        label: "About Content"
        name: "about"

        fields:

          - label: "Hero Headline"
            name: "headline"
            widget: "string"

          - label: "Hero Subtitle"
            name: "hero_subtitle"
            widget: "text"

          - label: "About Paragraph 1"
            name: "bio1"
            widget: "text"

          - label: "About Paragraph 2"
            name: "bio2"
            widget: "text"

          - label: "About Paragraph 3"
            name: "bio3"
            widget: "text"
            required: false

          - label: "Current Role"
            name: "role"
            widget: "string"

          - label: "Affiliation"
            name: "affiliation"
            widget: "text"

          - label: "Location"
            name: "location"
            widget: "string"
            default: "Columbia, Missouri"

          # CONTACT

          - label: "Email"
            name: "email"
            widget: "string"

          - label: "Phone"
            name: "phone"
            widget: "string"
            required: false

          # SOCIALS

          - label: "LinkedIn URL"
            name: "linkedin"
            widget: "string"
            required: false

          - label: "GitHub URL"
            name: "github"
            widget: "string"
            required: false

          - label: "Google Scholar URL"
            name: "scholar"
            widget: "string"
            required: false

          - label: "ORCID URL"
            name: "orcid"
            widget: "string"
            required: false

          - label: "Instagram URL"
            name: "instagram"
            widget: "string"
            required: false

          # SEO

          - label: "SEO Title"
            name: "seo_title"
            widget: "string"
            required: false

          - label: "SEO Description"
            name: "seo_description"
            widget: "text"
            required: false
